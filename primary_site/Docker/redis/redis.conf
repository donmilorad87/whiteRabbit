# Redis configuration for WiseRabbit primary site.
# Values are overridden by environment variables via docker-compose.

# Network
bind 0.0.0.0
port 6379
protected-mode no

# Memory
maxmemory 128mb
maxmemory-policy allkeys-lru

# Persistence (RDB snapshots)
save 900 1
save 300 10
save 60 10000
dbfilename dump.rdb
dir /data

# Logging
loglevel notice

# Connection
timeout 300
tcp-keepalive 60
